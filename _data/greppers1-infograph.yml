Badge: "Backup — Community Technology Capstone"
Title: "PNEC Emergency Response Hub"
Subtitle: "Neighbors Helping Neighbors"
Organization: "Poway Neighborhood Emergency Corps"
Description: "This is our backup project in case our primary (SFI Foundation) falls through. When wildfires or earthquakes hit Poway, communication breaks down — vulnerable residents on paper lists go unchecked, cell towers fail, and volunteers can't coordinate. We would build a digital dashboard that automates neighbor-to-neighbor check-ins and maps emergency resources in real time."

Features:
  - "Neighborhood Call Tree Automation — trigger phone/text chains to check every house on a block"
  - "Real-Time Disaster Mapping — interactive GIS map of evacuation zones and blocked roads"
  - "Volunteer Logistics Dashboard — centralized command center for task management"
  - "Searchable Resource Directory — preparedness resources and local emergency contacts"
  - "Offline-First Syncing — saves data locally, syncs when Wi-Fi is available"

