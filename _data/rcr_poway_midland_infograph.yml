# RCR Poway-Midland Railroad Capstone Infographic
Title: "RCR: Poway-Midland Railroad Digital Experience"
Description: "A Design-Based Research capstone by RCR team modernizing the Poway-Midland Railroad website with interactive features, real-time data systems, and enhanced user experiences for visitors and volunteers — transforming a static historical site into a dynamic digital destination."

Features:
  - title: "RCR Interactive Train Schedule System"
    image: "images/capstone/RCR-inforgraph.png"
    link: "/capstone/rcr/"
    alt: "RCR Interactive Train Schedule - Real-time departure board showing train times and availability"
    keyPoints:
      - "Real-time departure times with live status updates"
      - "Train capacity tracking (Running, Delayed, Full)"
      - "Online ticket reservation system"
      - "Mobile-responsive schedule interface"
      - "Automated email confirmations for reservations"
      - "Peak time prediction algorithms"
    subtitle: "Real-time ride information and digital reservations"
    description: "A digital schedule system developed by RCR that replaces the current static timetable with dynamic, real-time train ride information. Visitors can check next departure times, see train capacity, and reserve tickets online. The system uses data structures to optimize scheduling and provides a seamless mobile experience for visitors on the go."
    tech:
      - "HTML/CSS/JavaScript"
      - "YAML Data Storage"
      - "Responsive Web Design"
      - "Jekyll Liquid Templates"
      - "Local Storage API"
      - "Mobile-First UI"
    impact:
      - "Provides accurate, up-to-date train information 24/7"
      - "Reduces visitor confusion about operating hours"
      - "Streamlines the reservation process"
      - "Collects usage data for operational improvements"
      - "Improves mobile accessibility for on-site visitors"
    status: "Phase 1 - In Development"
    team:
    - Rebecca, Cyrus, Rishabh

  - title: "RCR Virtual Railroad Tour"
    image: "images/capstone/RCR-inforgraph.png"
    link: "/capstone/rcr/"
    alt: "RCR Virtual Railroad Tour - 360° interactive views of trains and Old Poway Park"
    keyPoints:
      - "360° panoramic views of trains and tracks"
      - "Interactive map showing train route through park"
      - "Clickable hotspots with train history facts"
      - "Historical photo gallery with timeline"
      - "Audio narration of railroad stories"
      - "Mobile-compatible 360° viewer"
    subtitle: "Interactive exploration of Old Poway Park"
    description: "An RCR-created virtual tour experience that brings the railroad online. Visitors can explore the park from anywhere, learn about train history through interactive hotspots, and see detailed 360° views of locomotives. The tour preserves railroad history digitally and serves as an educational resource for schools and families who can't visit in person."
    tech:
      - "360° Image Processing"
      - "Interactive Maps API"
      - "JavaScript Panorama Viewer"
      - "Responsive Touch Controls"
      - "Multimedia Integration"
      - "Digital Storytelling"
    impact:
      - "Attracts virtual visitors from around the world"
      - "Preserves railroad history in interactive digital format"
      - "Provides educational resource for local schools"
      - "Increases park visitation from virtual previews"
      - "Accessible to those with mobility limitations"
    status: "Phase 2 - Planned"
    team:
    - Rebecca, Cyrus, Rishabh

